name: Upload firmware to GitHub Release

on:
  workflow_call:
    inputs:
      version:
        description: Version of the release
        required: true
        type: string
      draft:
        description: Upload to a draft release only
        required: false
        type: boolean
        default: false

jobs:
  upload:
    name: Upload
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: files
          # Each artifact built by build.yml embeds its name as its top-level
          # directory, so merging yields files/<artifact-name>/<version>/
          # regardless of how many artifacts the run has. Without merging,
          # download-artifact v5+ drops the per-artifact directory when the
          # run has only a single artifact (actions/download-artifact#419).
          merge-multiple: true

      - name: Tree
        run: |-
          tree

      - name: Copy files to output
        run: |-
          shopt -s nullglob
          mkdir output
          version="${{ inputs.version }}"
          pushd files
          for device in *; do
            pushd $device
            pushd $version
            cp manifest.json "../../../output/$device.manifest.json"
            for bin in *.{bin,elf}; do
              md5sum $bin | head -c 32 > "../../../output/$bin.md5"
              sha256sum $bin | head -c 64 > "../../../output/$bin.sha256"
              cp $bin ../../../output/
            done
            popd
            popd
          done
          popd

      - name: Upload files to release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ inputs.version }}
          DRAFT: ${{ inputs.draft }}
        run: |-
          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" output/* --clobber
          else
            draft_flag=()
            if [ "$DRAFT" = "true" ]; then
              draft_flag=(--draft)
            fi
            gh release create "$VERSION" output/* --title "$VERSION" "${draft_flag[@]}"
          fi
