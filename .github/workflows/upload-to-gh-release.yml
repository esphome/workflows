name: Upload firmware to GitHub Release

on:
  workflow_call:
    inputs:
      version:
        description: Version of the release
        required: true
        type: string
      draft:
        description: Upload to a draft release only
        required: false
        type: boolean
        default: false

jobs:
  upload:
    name: Upload
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: files

      - name: Tree
        run: |-
          tree

      - name: Copy files to output
        run: |-
          shopt -s nullglob
          mkdir output
          version="${{ inputs.version }}"
          pushd files
          for device in *; do
            pushd $device
            if [ "$device" != "$version" ]; then
              pushd $version
              output_path="../../../output/"
            else
              output_path="../../output/"
            fi
            cp manifest.json "${output_path}$device.manifest.json"
            for bin in *.{bin,elf}; do
              md5sum $bin | head -c 32 > "${output_path}$bin.md5"
              sha256sum $bin | head -c 64 > "${output_path}$bin.sha256"
              cp $bin "$output_path"
            done
            if [ "$device" != "$version" ]; then
              popd
            fi
            popd
          done
          popd

      - name: Upload files to release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ inputs.version }}
          DRAFT: ${{ inputs.draft }}
        run: |-
          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" output/* --clobber
          else
            draft_flag=()
            if [ "$DRAFT" = "true" ]; then
              draft_flag=(--draft)
            fi
            gh release create "$VERSION" output/* --title "$VERSION" "${draft_flag[@]}"
          fi
