name: Upload firmware to GitHub Release

on:
  workflow_call:
    inputs:
      version:
        description: Version of the release
        required: true
        type: string
      draft:
        description: Upload to a draft release only
        required: false
        type: boolean
        default: false

jobs:
  upload:
    name: Upload
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: files

      - name: Tree
        run: |-
          tree

      - name: Copy files to output
        run: |-
          shopt -s nullglob
          mkdir output
          version="${{ inputs.version }}"
          pushd files
          for device in *; do
            pushd $device
            if [ "$device" != "$version" ]; then
              pushd $version
              output_path="../../../output/"
            else
              output_path="../../output/"
            fi
            cp manifest.json "${output_path}$device.manifest.json"
            for bin in *.{bin,elf}; do
              md5sum $bin | head -c 32 > "${output_path}$bin.md5"
              sha256sum $bin | head -c 64 > "${output_path}$bin.sha256"
              cp $bin "$output_path"
            done
            if [ "$device" != "$version" ]; then
              popd
            fi
            popd
          done
          popd

      - name: Upload files to release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ inputs.version }}
          DRAFT: ${{ inputs.draft }}
        run: |-
          # gh release view/upload cannot resolve draft releases by tag (the tag
          # does not exist until publish), so resolve the release id via the API,
          # which lists drafts too.
          if ! release_id=$(gh api "repos/$GH_REPO/releases" --paginate --jq '[.[] | select(.tag_name == $ENV.VERSION)] | first | .id // empty'); then
            echo "::error::Failed to list releases for $GH_REPO."
            exit 1
          fi
          if [ -z "$release_id" ]; then
            draft_flag=()
            if [ "$DRAFT" = "true" ]; then
              draft_flag=(--draft)
            fi
            gh release create "$VERSION" output/* --title "$VERSION" "${draft_flag[@]}"
          else
            if ! assets=$(gh api "repos/$GH_REPO/releases/$release_id/assets" --paginate --jq '.[] | "\(.id)\t\(.name)"'); then
              echo "::error::Failed to list assets for release $release_id."
              exit 1
            fi
            for file in output/*; do
              name=$(basename "$file")
              asset_id=$(awk -F'\t' -v name="$name" '$2 == name {print $1}' <<< "$assets")
              if [ -n "$asset_id" ]; then
                gh api --method DELETE "repos/$GH_REPO/releases/assets/$asset_id"
              fi
              gh api --method POST \
                "https://uploads.github.com/repos/$GH_REPO/releases/$release_id/assets?name=$name" \
                --input "$file" > /dev/null
            done
          fi
